<!DOCTYPE html>
<html lang="ko">
<head>

    <title>PTZ Speaker Tracking Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>PTZ Speaker Tracking Dashboard</h1>

        <div class="panel">
            <h2>시스템 상태</h2>
